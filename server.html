<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: #0a0e14; /* Deep dark background */
            color: #d1d5db;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .terminal-card {
            border: 1px solid #1e293b;
            padding: 2rem;
            background: #0f172a;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        button {
            background-color: transparent;
            color: #10b981; /* Terminal green */
            border: 1px solid #10b981;
            padding: 10px 20px;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #10b981;
            color: #000;
            box-shadow: 0 0 15px #10b981;
        }

        .status-light {
            height: 10px;
            width: 10px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="terminal-card">
        <h3><span class="status-light"></span> SERVER_NODE_01</h3>
        <p>AR Ahad</p>
        <button onclick="window.location.href='https://sampling-vividly-velocity.ngrok-free.dev/files/'">
            Initialize Redirect
        </button>
    </div>

</body>
</html>
